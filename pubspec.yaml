name: flutter_mvvm_starter
description: "Flutter MVVM Starter — Feature-based MVVM + Repository pattern with Cubit state management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1

  # DI
  get_it: ^9.2.0

  # Network
  dio: ^5.9.1

  # Functional error handling
  dartz: ^0.10.1

  # Router
  go_router: ^17.0.1

  # Code generation annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^9.0.0

  # UI utilities
  flutter_smart_dialog: ^4.9.8+9
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  fade_shimmer: ^2.4.0
  intl: ^0.20.2

  # Firebase
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  # Validation
  form_field_validator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Rename package
  change_app_package_name: ^1.5.0

  # Code generation
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.11.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true

  # ─── Assets ──────────────────────────────────────────────────────────────────
  assets:
    - assets/images/
    - assets/icons/

  # ─── Fonts ───────────────────────────────────────────────────────────────────
  # Add your .ttf files under assets/fonts/<Family>/ then uncomment below.
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter/Inter-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Inter/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter/Inter-Bold.ttf
  #         weight: 700

  # (placeholder — remove this line once you uncomment fonts above)
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
